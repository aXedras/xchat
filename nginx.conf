
server {
    listen       8080;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html index.htm;
    server_tokens off;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self' ws://127.0.0.1:8080 ws://localhost:8080 https://*.supabase.co wss://*.supabase.co; font-src 'self' data:; frame-ancestors 'none'; img-src 'self' data: https://images.unsplash.com https://source.unsplash.com https://*.supabase.co; object-src 'none'; script-src 'self'; style-src 'self'; form-action 'self'" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        try_files $uri $uri/ @spa;
    }

    location = /runtime-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files $uri =404;
    }

    location @spa {
        expires -1;
        try_files /index.html =404;
    }

    location ~* \.(?:css|gif|ico|jpeg|jpg|js|json|map|mjs|png|svg|txt|webp|xml)$ {
        expires 1y;
        try_files $uri =404;
    }

    error_page   500 502 503 504  /50x.html;

    location = /50x.html {
        try_files /50x.html =404;
    }
}
