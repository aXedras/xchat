name: CI Quality And Security

permissions:
  actions: read
  contents: read
  security-events: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep
        run: python3 -m pip install --upgrade pip semgrep

      - name: Run lint, build, duplication and architecture checks
        run: npm run ci:verify

      - name: Run Semgrep with OWASP Top 10 and architecture rules
        run: npm run semgrep:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Build Docker image
        run: npm run docker:build:ci

      - name: Start container for OWASP scan
        run: |
          docker run -d --rm --name xchat-ci -p 127.0.0.1::8080 xchat:ci
          host_port=$(docker port xchat-ci 8080/tcp | sed 's/.*://')
          echo "XCHAT_HOST_PORT=$host_port" >> "$GITHUB_ENV"

      - name: Wait for application
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent "http://127.0.0.1:$XCHAT_HOST_PORT" > /dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Application did not become ready in time" >&2
          exit 1

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p reports/zap
          chmod 777 reports/zap
          docker run --rm --network host -v "$PWD/reports/zap:/zap/wrk/:rw" ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t "http://127.0.0.1:$XCHAT_HOST_PORT" -m 3 -r zap-report.html -J zap-report.json

      - name: Stop container
        if: always()
        run: docker stop xchat-ci || true

      - name: Upload Semgrep SARIF
        if: always() && github.actor != 'nektos/act' && hashFiles('semgrep.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Upload quality, E2E and ZAP reports
        if: always() && github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: quality-security-and-e2e-reports
          path: |
            semgrep.sarif
            reports/zap
            playwright-report
            test-results
          if-no-files-found: ignore
