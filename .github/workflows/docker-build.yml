name: CI Quality And Security

permissions:
  actions: read
  contents: read
  packages: write
  security-events: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint, build and duplication checks
        run: npm run lint && npm run build && npm run jscpd

      - name: Upload quality reports
        if: always() && github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            reports/jscpd
          if-no-files-found: ignore

  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install Semgrep
        run: python3 -m pip install --upgrade pip semgrep

      - name: Run Semgrep with OWASP Top 10 and architecture rules
        run: npm run semgrep:ci

      - name: Detect GitHub code scanning availability
        id: code-scanning
        if: always() && github.actor != 'nektos/act' && hashFiles('semgrep.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: repo } = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              const security = repo.security_and_analysis ?? {};
              const enabled = Object.values(security).some(
                (feature) => feature && typeof feature === 'object' && feature.status === 'enabled',
              );

              core.setOutput('enabled', enabled ? 'true' : 'false');

              if (!enabled) {
                core.notice('Skipping SARIF upload because code scanning is not enabled for this repository.');
              }
            } catch (error) {
              core.warning(`Unable to determine code scanning status: ${error.message}`);
              core.setOutput('enabled', 'false');
            }

      - name: Upload Semgrep SARIF
        if: always() && steps.code-scanning.outputs.enabled == 'true'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Upload Semgrep reports
        if: always() && github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep.sarif
          if-no-files-found: ignore

  e2e-admin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run admin E2E tests
        run: >-
          npx playwright test
          e2e/admin-api-connection.spec.ts
          e2e/admin-company-registration.spec.ts
          e2e/admin-fee-rules.spec.ts

      - name: Upload admin E2E reports
        if: always() && github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-admin-reports
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  e2e-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run core E2E tests
        run: >-
          npx playwright test
          e2e/auth-guards.spec.ts
          e2e/persistence-reload.spec.ts
          e2e/rfq-seeded-scenario.spec.ts
          e2e/rfq-workflow.spec.ts

      - name: Upload core E2E reports
        if: always() && github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-core-reports
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  docker-zap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: npm run docker:build:ci

      - name: Start container for OWASP scan
        run: |
          docker run -d --rm --name xchat-ci -p 127.0.0.1::8080 xchat:ci
          host_port=$(docker port xchat-ci 8080/tcp | sed 's/.*://')
          echo "XCHAT_HOST_PORT=$host_port" >> "$GITHUB_ENV"

      - name: Wait for application
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent "http://127.0.0.1:$XCHAT_HOST_PORT" > /dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Application did not become ready in time" >&2
          exit 1

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p reports/zap
          chmod 777 reports/zap
          docker run --rm --network host -v "$PWD/reports/zap:/zap/wrk/:rw" ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -I -t "http://127.0.0.1:$XCHAT_HOST_PORT" -m 3 -r zap-report.html -J zap-report.json

      - name: Stop container
        if: always()
        run: docker stop xchat-ci || true

      - name: Upload ZAP reports
        if: always() && github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: |
            reports/zap
          if-no-files-found: ignore

  ghcr-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quality
      - semgrep
      - e2e-admin
      - e2e-core
      - docker-zap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

