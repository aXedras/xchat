services:
  xchat:
    image: ghcr.io/marcopersi/xchat:latest
    container_name: xchat
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      XCHAT_VENDOR_ADMIN_EMAIL: ${XCHAT_VENDOR_ADMIN_EMAIL:-admin@xchat.local}
      XCHAT_VENDOR_ADMIN_PASSWORD: ${XCHAT_VENDOR_ADMIN_PASSWORD:-change-me-demo-admin}
      XCHAT_API_MODE: ${XCHAT_API_MODE:-mock}
      XCHAT_PERSISTENCE_PROVIDER: ${XCHAT_PERSISTENCE_PROVIDER:-local}
      XCHAT_REALTIME_CARRIER: ${XCHAT_REALTIME_CARRIER:-local}
      XCHAT_BIL_ENABLED: ${XCHAT_BIL_ENABLED:-false}
      XCHAT_BIL_BASE_URL: ${XCHAT_BIL_BASE_URL:-}
      XCHAT_BIL_API_KEY: ${XCHAT_BIL_API_KEY:-}
      XCHAT_BIL_NETWORK: ${XCHAT_BIL_NETWORK:-}
      XCHAT_BIL_PARTICIPANT_ID: ${XCHAT_BIL_PARTICIPANT_ID:-}
      XCHAT_BIL_LEDGER_ID: ${XCHAT_BIL_LEDGER_ID:-}
